<!DOCTYPE html>
<html lang="ja">
  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>業務日報アプリ</title>
      <script src="https://cdn.tailwindcss.com"></script>
  </head>
<body>
      <div id="app"></div>div>
      <script>
                class App {
                              constructor() {
                                                this.reports = JSON.parse(localStorage.getItem('reports') || '[]');
                                                this.date = new Date().toISOString().split('T')[0];
                                                this.entry = '';
                                                this.cat = '業務';
                                                this.edit = null;
                                                this.render();
                              }
                              save() {
                                                if (!this.entry.trim()) return alert('内容を入力してください');
                                                if (this.edit !== null) {
                                                                      this.reports[this.edit] = {...this.reports[this.edit], content: this.entry, category: this.cat};
                                                                      this.edit = null;
                                                } else {
                                                                      this.reports.push({id: Date.now(), date: this.date, content: this.entry, category: this.cat, time: new Date().toLocaleTimeString('ja-JP')});
                                                }
                                                this.entry = '';
                                                this.cat = '業務';
                                                localStorage.setItem('reports', JSON.stringify(this.reports));
                                                this.render();
                              }
                              delete(id) {
                                                this.reports = this.reports.filter(r => r.id !== id);
                                                localStorage.setItem('reports', JSON.stringify(this.reports));
                                                this.render();
                              }
                              edit_start(id) {
                                                const idx = this.reports.findIndex(r => r.id === id);
                                                if (idx !== -1) {
                                                                      this.edit = idx;
                                                                      this.entry = this.reports[idx].content;
                                                                      this.cat = this.reports[idx].category;
                                                                      this.render();
                                                }
                              }
                              render() {
                                                const today = this.reports.filter(r => r.date === this.date);
                                                const dateStr = new Date(this.date).toLocaleDateString('ja-JP', {year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
                                                document.getElementById('app').innerHTML = `
                                                                    <div class="min-h-screen bg-slate-100">
                                                                                            <div class="bg-blue-600 text-white p-8">
                                                                                                                        <h1 class="text-4xl font-bold">📋 業務日報</h1>
                                                                                                                                                </div>
                                                                                                                                                                        <div class="max-w-4xl mx-auto p-8">
                                                                                                                                                                                                    <div class="mb-6">
                                                                                                                                                                                                                                    <label class="block text-sm font-bold mb-2">日付選択</label>
                                                                                                                                                                                                                                                                    <input type="date" value="${this.date}" onchange="app.date = this.value; app.entry = ''; app.edit = null; app.render();" class="w-full px-4 py-2 border rounded">
                                                                                                                                                                                                                                                                                                    <p class="text-sm text-gray-600 mt-2">${dateStr}</p>
                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                            <div class="bg-white p-6 rounded shadow mb-6">
                                                                                                                                                                                                                                                                                                                                                                                            <h2 class="text-lg font-bold mb-4">${this.edit !== null ? '📝 編集' : '✍️ 新規'}</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="mb-4 flex gap-2">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                ${['業務', '会議', 'その他'].map(c => `<button onclick="app.cat = '${c}'; app.render();" class="px-3 py-1 rounded ${this.cat === c ? 'bg-blue-500 text-white' : 'bg-gray-200'}">${c}</button>`).join('')}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <textarea placeholder="内容を入力..." onchange="app.entry = this.value;" class="w-full px-4 py-2 border rounded mb-4 h-24">${this.entry}</textarea>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="flex gap-2">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button onclick="app.save();" class="px-6 py-2 bg-blue-500 text-white rounded">${this.edit !== null ? '更新' : '追加'}</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ${this.edit !== null ? `<button onclick="app.edit = null; app.entry = ''; app.render();" class="px-6 py-2 bg-gray-300 rounded">キャンセル</button>` : ''}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <h2 class="text-lg font-bold mb-4">📅 ${today.length}件</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ${today.length === 0 ? '<p class="text-gray-500">登録なし</p>' : today.map(r => `<div class="bg-white p-4 mb-3 rounded shadow"><div class="flex justify-between mb-2"><span class="px-2 py-1 text-sm rounded ${r.category === '業務' ? 'bg-blue-100' : r.category === '会議' ? 'bg-purple-100' : 'bg-gray-100'}">${r.category}</span><span class="text-xs text-gray-500">${r.time}</span></div><p class="text-gray-700 mb-3">${r.content}</p><div class="flex gap-2"><button onclick="app.edit_start(${r.id});" class="px-3 py-1 bg-gray-200 rounded text-sm">編集</button><button onclick="app.delete(${r.id});" class="px-3 py-1 bg-red-100 text-red-600 rounded text-sm">削除</button></div></div>`).join('')}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        `;
                              }
                }
                const app = new App();
      </script>
</body>
</html>html>
      </script>
</body></title>
  </head>
